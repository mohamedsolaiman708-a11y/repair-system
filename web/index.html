<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Repair Management System">
  <title>Repair System</title>
  <link rel="manifest" href="manifest.json">
</head>
<body style="background-color: #f3f4f6;">
  <div id="loading-indicator" style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;font-family:sans-serif;">
    <div style="width:40px;height:40px;border:4px solid #ddd;border-top:4px solid #3498db;border-radius:50%;animation:spin 1s linear infinite;"></div>
    <h3 id="loading-text" style="margin-top:20px;color:#444;">جاري تشغيل النظام...</h3>
  </div>
  <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function(ev) {
      // استخدام الطريقة الحديثة _flutter.loader.load بدلاً من loadEntrypoint
      _flutter.loader.load({
        serviceWorkerSettings: {
          serviceWorkerVersion: null, // تعطيل الـ service worker لتجنب مشاكل الكاش في Vercel
        },
        onEntrypointLoaded: async function(engineInitializer) {
          try {
            const appRunner = await engineInitializer.initializeEngine({
              renderer: "html", // إجبار المتصفح على نمط HTML لضمان أعلى توافقية
              useColorEmoji: true
            });
            
            // إزالة مؤشر التحميل عند جاهزية التطبيق
            var loader = document.getElementById('loading-indicator');
            if (loader) loader.remove();
            
            await appRunner.runApp();
          } catch (err) {
            console.error("Initialization failed:", err);
            document.getElementById('loading-text').innerText = "فشل في بدء النظام: " + err;
            document.getElementById('loading-text').style.color = "red";
          }
        }
      });
    });
  </script>
</body>
</html>
