<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Repair Management System">
  <title>Repair System</title>
  <link rel="manifest" href="manifest.json">
</head>
<body style="background-color: #f3f4f6;">
  <div id="loading-indicator" style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;font-family:sans-serif;">
    <div style="width:40px;height:40px;border:4px solid #ddd;border-top:4px solid #3498db;border-radius:50%;animation:spin 1s linear infinite;"></div>
    <h3 style="margin-top:20px;color:#444;">جاري تشغيل النظام...</h3>
  </div>
  <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

  <!-- تشغيل فلاتر بالطريقة الجديدة -->
  <script src="flutter_bootstrap.js" async></script>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loader = document.getElementById('loading-indicator');
      if (loader) loader.remove();
    });
  </script>
</body>
</html>
